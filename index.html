<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUNE — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #e8d5a3;
    --sand-dark: #c9a96e;
    --sand-deep: #8b6914;
    --spice: #c4500a;
    --spice-bright: #e8721c;
    --void: #0a0804;
    --void-mid: #1a1208;
    --void-light: #2a1e0e;
    --text: #f0e6cc;
    --text-dim: #9a8060;
    --gold: #d4a843;
    --gold-bright: #f0c84a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Sand texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196,80,10,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,168,67,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 56px 0 40px;
    position: relative;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .ornament-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--sand-dark));
  }

  .ornament-line.right {
    background: linear-gradient(90deg, var(--sand-dark), transparent);
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--spice);
    transform: rotate(45deg);
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--sand);
    text-shadow: 0 0 60px rgba(196,80,10,0.4), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--spice-bright);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin: 32px 0 40px;
    background: var(--void-mid);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 2px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab:hover { color: var(--sand); }

  .tab.active {
    background: var(--void-light);
    color: var(--gold-bright);
    border: 1px solid rgba(212,168,67,0.3);
    box-shadow: 0 0 20px rgba(212,168,67,0.05);
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* LEADERBOARD SECTION */
  .rank-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }

  @media (max-width: 600px) { .rank-cards { grid-template-columns: 1fr; } }

  .rank-card {
    background: var(--void-mid);
    border: 1px solid rgba(212,168,67,0.12);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .rank-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--rank-color, var(--sand-dark));
  }

  .rank-card:hover { border-color: rgba(212,168,67,0.3); }

  .rank-card[data-rank="1"] { --rank-color: var(--gold-bright); border-color: rgba(212,168,67,0.25); }
  .rank-card[data-rank="2"] { --rank-color: #c0c0c0; }
  .rank-card[data-rank="3"] { --rank-color: #cd7f32; }
  .rank-card[data-rank="4"] { --rank-color: var(--spice); }

  .rank-num {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--rank-color, var(--text-dim));
    opacity: 0.25;
    position: absolute;
    right: 16px;
    top: 12px;
    line-height: 1;
  }

  .rank-name {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--sand);
    margin-bottom: 4px;
  }

  .rank-score {
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--rank-color, var(--text));
    line-height: 1;
  }

  .rank-score span {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .rank-games {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }

  /* PERIOD SELECTOR */
  .period-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .period-btn {
    padding: 6px 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    border: 1px solid rgba(212,168,67,0.2);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .period-btn:hover { color: var(--sand); border-color: rgba(212,168,67,0.4); }
  .period-btn.active { background: var(--void-light); color: var(--gold-bright); border-color: rgba(212,168,67,0.5); }

  /* GAME HISTORY */
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--spice-bright);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(212,168,67,0.1);
  }

  .game-row {
    background: var(--void-mid);
    border: 1px solid rgba(212,168,67,0.1);
    margin-bottom: 8px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .game-row:hover { border-color: rgba(212,168,67,0.25); }

  .game-date {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .game-players {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .player-chip {
    font-size: 0.78rem;
    padding: 2px 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,168,67,0.1);
  }

  .player-chip .chip-rank { color: var(--gold-bright); margin-right: 4px; font-family: 'Cinzel', serif; font-size: 0.65rem; }

  .game-delete {
    background: none;
    border: 1px solid rgba(196,80,10,0.2);
    color: var(--spice);
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .game-delete:hover { background: rgba(196,80,10,0.15); border-color: var(--spice); }

  /* ADD GAME SECTION */
  .form-card {
    background: var(--void-mid);
    border: 1px solid rgba(212,168,67,0.15);
    padding: 32px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--void);
    border: 1px solid rgba(212,168,67,0.2);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: rgba(212,168,67,0.6);
    box-shadow: 0 0 0 2px rgba(212,168,67,0.06);
  }

  .field select option { background: var(--void-mid); }

  .date-row {
    margin-bottom: 24px;
  }

  .date-row .field { max-width: 240px; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,168,67,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }

  .submit-btn:hover::before { transform: translateX(0); }
  .submit-btn:hover { border-color: var(--gold-bright); box-shadow: 0 0 20px rgba(212,168,67,0.15); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SETTINGS */
  .settings-card {
    background: var(--void-mid);
    border: 1px solid rgba(212,168,67,0.15);
    padding: 32px;
    margin-bottom: 16px;
  }

  .settings-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--sand-dark);
    margin-bottom: 20px;
  }

  .settings-field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .settings-field input {
    width: 100%;
    background: var(--void);
    border: 1px solid rgba(212,168,67,0.2);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .settings-field input:focus { border-color: rgba(212,168,67,0.5); }

  .save-btn {
    padding: 10px 28px;
    background: none;
    border: 1px solid rgba(212,168,67,0.4);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-btn:hover { background: rgba(212,168,67,0.08); border-color: var(--gold); }

  .info-box {
    background: rgba(196,80,10,0.08);
    border: 1px solid rgba(196,80,10,0.25);
    padding: 16px 20px;
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.7;
    font-style: italic;
  }

  .info-box strong { color: var(--spice-bright); font-style: normal; }
  .info-box a { color: var(--sand-dark); }

  /* STATUS */
  .status-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--void-light);
    border: 1px solid rgba(212,168,67,0.3);
    padding: 10px 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    transition: transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .status-bar.show { transform: translateX(-50%) translateY(0); }
  .status-bar.error { color: var(--spice-bright); border-color: rgba(196,80,10,0.4); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 1rem;
  }

  /* Score badge */
  .score-delta {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    padding: 2px 6px;
    margin-left: 4px;
  }
  .score-delta.pos { color: #7dce82; }
  .score-delta.neg { color: var(--spice-bright); }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">
  <header>
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
    <h1>DUNE</h1>
    <div class="subtitle">Leaderboard of Arrakis</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('board')">RANKINGS</button>
    <button class="tab" onclick="showTab('history')">HISTORY</button>
    <button class="tab" onclick="showTab('add')">ADD GAME</button>
    <button class="tab" onclick="showTab('settings')">SETTINGS</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="section active" id="tab-board">
    <div class="period-bar">
      <button class="period-btn active" onclick="setPeriod('all', this)">ALL TIME</button>
      <button class="period-btn" onclick="setPeriod('month', this)">THIS MONTH</button>
      <button class="period-btn" onclick="setPeriod('3month', this)">3 MONTHS</button>
      <button class="period-btn" onclick="setPeriod('year', this)">THIS YEAR</button>
    </div>
    <div class="rank-cards" id="rank-cards"></div>
    <div class="section-label">RECENT GAMES</div>
    <div id="recent-games"></div>
  </div>

  <!-- HISTORY -->
  <div class="section" id="tab-history">
    <div class="section-label">ALL GAME RECORDS</div>
    <div id="all-games"></div>
  </div>

  <!-- ADD GAME -->
  <div class="section" id="tab-add">
    <div class="form-card">
      <div class="section-label">RECORD NEW GAME</div>
      <div class="date-row">
        <div class="field">
          <label>DATE</label>
          <input type="date" id="game-date">
        </div>
      </div>
      <div class="form-grid" id="player-form"></div>
      <button class="submit-btn" onclick="submitGame()">INSCRIBE UNTO THE RECORD</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="section" id="tab-settings">
    <div class="settings-card">
      <h3>GITHUB GIST CONFIGURATION</h3>
      <div class="settings-field">
        <label>PERSONAL ACCESS TOKEN</label>
        <input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <label>GIST ID (비워두면 자동 생성)</label>
        <input type="text" id="cfg-gist" placeholder="자동 생성됩니다">
        <button class="save-btn" onclick="saveConfig()">SAVE CONFIGURATION</button>
      </div>
    </div>
    <div class="info-box">
      <strong>설정 방법</strong><br>
      1. <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a> 에서 토큰 생성<br>
      2. <strong>gist</strong> 권한만 체크하고 생성<br>
      3. 토큰을 위에 붙여넣고 Save<br>
      4. 처음 게임 기록하면 Gist가 자동으로 만들어져요<br><br>
      <strong>주의:</strong> 토큰은 이 기기의 localStorage에만 저장됩니다.
    </div>
  </div>
</div>

<div class="status-bar" id="status"></div>

<script>
const PLAYERS = ['동규', '경태', '철승', '형석'];
const RANK_POINTS = [3, 1, -1, -3];

let state = {
  games: [],
  token: '',
  gistId: ''
};

let currentPeriod = 'all';

// ---------- INIT ----------
window.addEventListener('DOMContentLoaded', async () => {
  // Set today's date
  document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  buildPlayerForm();
  loadConfig();
  await loadData();
  render();
});

// ---------- CONFIG ----------
function loadConfig() {
  state.token = localStorage.getItem('dune_token') || '';
  state.gistId = localStorage.getItem('dune_gist_id') || '';
  document.getElementById('cfg-token').value = state.token;
  document.getElementById('cfg-gist').value = state.gistId;
}

function saveConfig() {
  state.token = document.getElementById('cfg-token').value.trim();
  state.gistId = document.getElementById('cfg-gist').value.trim();
  localStorage.setItem('dune_token', state.token);
  localStorage.setItem('dune_gist_id', state.gistId);
  showStatus('Configuration saved');
  loadData().then(render);
}

// ---------- GIST API ----------
async function loadData() {
  if (!state.token) return;
  if (!state.gistId) return;
  try {
    const res = await fetch(`https://api.github.com/gists/${state.gistId}`, {
      headers: { Authorization: `token ${state.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) { showStatus('Failed to load data — check settings', true); return; }
    const gist = await res.json();
    const content = gist.files['dune_scores.json']?.content;
    if (content) state.games = JSON.parse(content);
  } catch(e) {
    showStatus('Network error loading data', true);
  }
}

async function saveData() {
  if (!state.token) { showStatus('Token not set — go to Settings', true); return false; }

  const content = JSON.stringify(state.games, null, 2);
  const body = { files: { 'dune_scores.json': { content } } };

  if (!state.gistId) {
    // Create new gist
    body.description = 'Dune Board Game Leaderboard';
    body.public = false;
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { Authorization: `token ${state.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) { showStatus('Failed to create Gist', true); return false; }
    const gist = await res.json();
    state.gistId = gist.id;
    localStorage.setItem('dune_gist_id', state.gistId);
    document.getElementById('cfg-gist').value = state.gistId;
  } else {
    const res = await fetch(`https://api.github.com/gists/${state.gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${state.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) { showStatus('Failed to save data', true); return false; }
  }
  return true;
}

// ---------- FORM ----------
function buildPlayerForm() {
  const grid = document.getElementById('player-form');
  grid.innerHTML = PLAYERS.map(p => `
    <div class="field">
      <label>${p} — RANK</label>
      <select id="rank-${p}">
        <option value="">— select —</option>
        ${[1,2,3,4].map(r => `<option value="${r}">${r}등</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>${p} — SCORE</label>
      <input type="number" id="score-${p}" placeholder="0" min="0">
    </div>
  `).join('');
}

async function submitGame() {
  const date = document.getElementById('game-date').value;
  if (!date) { showStatus('날짜를 선택해주세요', true); return; }

  const results = [];
  const usedRanks = [];
  for (const p of PLAYERS) {
    const rank = parseInt(document.getElementById(`rank-${p}`).value);
    const score = parseInt(document.getElementById(`score-${p}`).value) || 0;
    if (!rank) { showStatus(`${p}의 순위를 입력해주세요`, true); return; }
    if (usedRanks.includes(rank)) { showStatus(`순위 ${rank}등이 중복됩니다`, true); return; }
    usedRanks.push(rank);
    results.push({ player: p, rank, score, points: RANK_POINTS[rank - 1] });
  }

  const game = { id: Date.now(), date, results };
  state.games.push(game);
  state.games.sort((a, b) => b.date.localeCompare(a.date));

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'SAVING…';

  const ok = await saveData();
  btn.disabled = false;
  btn.textContent = 'INSCRIBE UNTO THE RECORD';

  if (ok) {
    showStatus('Game recorded successfully');
    render();
    showTab('board');
    // reset form
    buildPlayerForm();
    document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  }
}

// ---------- DATA ----------
function filteredGames() {
  const now = new Date();
  return state.games.filter(g => {
    const d = new Date(g.date);
    if (currentPeriod === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (currentPeriod === '3month') { const cutoff = new Date(now); cutoff.setMonth(now.getMonth() - 3); return d >= cutoff; }
    if (currentPeriod === 'year') return d.getFullYear() === now.getFullYear();
    return true;
  });
}

function calcStandings(games) {
  return PLAYERS.map(p => {
    const entries = games.flatMap(g => g.results.filter(r => r.player === p));
    const totalPoints = entries.reduce((s, r) => s + r.points, 0);
    const totalScore = entries.reduce((s, r) => s + r.score, 0);
    const wins = entries.filter(r => r.rank === 1).length;
    return { player: p, totalPoints, totalScore, wins, games: entries.length };
  }).sort((a, b) => b.totalPoints - a.totalPoints || b.totalScore - a.totalScore);
}

// ---------- RENDER ----------
function render() {
  const games = filteredGames();
  const standings = calcStandings(games);
  renderRanks(standings);
  renderRecentGames(state.games.slice(0, 5), 'recent-games');
  renderAllGames();
}

function renderRanks(standings) {
  const el = document.getElementById('rank-cards');
  el.innerHTML = standings.map((s, i) => `
    <div class="rank-card" data-rank="${i+1}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-name">${s.player}</div>
      <div class="rank-score">${s.totalPoints > 0 ? '+' : ''}${s.totalPoints}<span>pts</span></div>
      <div class="rank-games">${s.games}게임 · 1등 ${s.wins}회 · 점수합 ${s.totalScore}</div>
    </div>
  `).join('');
}

function renderRecentGames(games, containerId) {
  const el = document.getElementById(containerId);
  if (!games.length) { el.innerHTML = '<div class="empty-state">기록된 게임이 없습니다</div>'; return; }
  el.innerHTML = games.map(g => gameRow(g, false)).join('');
}

function renderAllGames() {
  const el = document.getElementById('all-games');
  if (!state.games.length) { el.innerHTML = '<div class="empty-state">기록된 게임이 없습니다</div>'; return; }
  el.innerHTML = state.games.map(g => gameRow(g, true)).join('');
}

function gameRow(g, deletable) {
  const sorted = [...g.results].sort((a, b) => a.rank - b.rank);
  const chips = sorted.map(r => {
    const sign = r.points > 0 ? '+' : '';
    return `<span class="player-chip"><span class="chip-rank">${r.rank}.</span>${r.player} ${r.score}점 <span class="score-delta ${r.points > 0 ? 'pos' : 'neg'}">${sign}${r.points}</span></span>`;
  }).join('');

  const delBtn = deletable ? `<button class="game-delete" onclick="deleteGame(${g.id})" title="삭제">✕</button>` : '<div></div>';

  return `
    <div class="game-row">
      <div class="game-date">${formatDate(g.date)}</div>
      <div class="game-players">${chips}</div>
      ${delBtn}
    </div>`;
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${y}.${m}.${day}`;
}

// ---------- ACTIONS ----------
async function deleteGame(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  state.games = state.games.filter(g => g.id !== id);
  const ok = await saveData();
  if (ok) { showStatus('Game deleted'); render(); }
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  const idx = ['board','history','add','settings'].indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

// ---------- STATUS ----------
let statusTimer;
function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar show' + (isError ? ' error' : '');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
